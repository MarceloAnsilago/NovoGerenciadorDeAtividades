<script>
(function () {
  function collectStylesHtml() {
    const selectors = [
      "style#programar-styles",
      "style[data-print-include]",
      'link[rel="stylesheet"][href*="bootstrap"]',
      'link[rel="stylesheet"][href*="bootstrap-icons"]',
    ];
    const seen = new Set();
    const parts = [];
    selectors.forEach((sel) => {
      document.querySelectorAll(sel).forEach((el) => {
        const html = el.outerHTML;
        if (html && !seen.has(html)) {
          seen.add(html);
          parts.push(html);
        }
      });
    });
    return parts.join("\n");
  }

  function printArea(btn, targetId) {
    if (!btn || btn.dataset.printing === "1") return;
    const target = document.getElementById(targetId);
    if (!target) return;
    const html = target.outerHTML || "";
    if (!html.trim()) return;

    btn.dataset.printing = "1";
    btn.disabled = true;

    const iframe = document.createElement("iframe");
    Object.assign(iframe.style, {
      position: "fixed",
      width: "0",
      height: "0",
      opacity: "0",
      pointerEvents: "none",
    });
    document.body.appendChild(iframe);

    let cleaned = false;
    const cleanup = () => {
      if (cleaned) return;
      cleaned = true;
      delete btn.dataset.printing;
      btn.disabled = false;
      iframe.remove();
    };

    iframe.onload = () => {
      try {
        const win = iframe.contentWindow;
        if (!win) return cleanup();
        win.onafterprint = () => window.setTimeout(cleanup, 20);
        win.focus();
        window.setTimeout(() => {
          try { win.print(); } catch (_) { cleanup(); }
        }, 250);
      } catch (_) {
        cleanup();
      }
    };

    const doc = iframe.contentDocument || iframe.contentWindow?.document;
    if (!doc) return cleanup();
    doc.open();
    doc.write(`<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Relatorio de Programacao</title>
  ${collectStylesHtml()}
  <style>
    body{margin:0;padding:8px;background:#fff;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:11px;}
    @page{size:A4 landscape;margin:8mm;}
    .no-print{display:none!important;}
  </style>
</head>
<body>${html}</body>
</html>`);
    doc.close();
  }

  document.addEventListener("click", function (ev) {
    const btn = ev.target.closest?.("#relatorio-programacao-btn-print");
    if (!btn) return;
    ev.preventDefault();
    printArea(btn, "relatorio-programacao-print-area");
  }, true);
})();
</script>
