<script>
(function () {
  function setPrintingState(btn, isPrinting) {
    if (!btn) return;

    const icon = btn.querySelector("i");
    const label = btn.querySelector(".btn-label");

    if (isPrinting) {
      btn.dataset.printing = "1";
      btn.disabled = true;
      if (icon) {
        btn.dataset.originalIconClass = icon.className;
        icon.className = "";
        icon.classList.add("me-1", "spinner-border", "spinner-border-sm");
      }
      if (label) {
        btn.dataset.originalLabel = label.textContent || "";
        label.textContent = "Imprimindo...";
      }
      return;
    }

    delete btn.dataset.printing;
    btn.disabled = false;
    if (icon) icon.className = btn.dataset.originalIconClass || "bi bi-printer me-1";
    if (label) label.textContent = btn.dataset.originalLabel || "Imprimir";
  }

  document.addEventListener("click", function (ev) {
    const btn = ev.target.closest?.("#relatorio-programacao-btn-print");
    if (!btn || btn.dataset.printing === "1") return;

    ev.preventDefault();
    setPrintingState(btn, true);

    const cleanup = () => {
      window.setTimeout(() => setPrintingState(btn, false), 30);
    };

    try {
      const url = new URL(window.location.href);
      url.searchParams.set("print", "1");
      window.open(url.toString(), "_blank", "noopener");
      cleanup();
    } catch (_) {
      cleanup();
    }
  }, true);
})();
</script>
