{% comment %} Partial: _cards_metas.html {% endcomment %}
<div class="mb-2">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <label class="form-label mb-0">Escolha a meta</label>
    <div class="d-flex align-items-center gap-2">
      <label for="metasStatusSelect" class="form-label small mb-0">Status</label>
      <select id="metasStatusSelect" class="form-select form-select-sm" aria-label="Filtrar metas por status">
        <option value="">Todos</option>
        <option value="andamento">Em andamento</option>
        <option value="atrasada">Atrasadas</option>
        <option value="concluida">Concluídas</option>
      </select>
    </div>
  </div>
  <div id="metasGrid" class="metas-grid">
    {# Aqui os cards serão renderizados por JS #}
    <div class="alert alert-light border mb-0">Selecione uma data para carregar as metas.</div>
  </div>
</div>
