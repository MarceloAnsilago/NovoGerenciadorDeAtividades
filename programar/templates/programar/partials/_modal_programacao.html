<!-- templates/programar/partials/_modal_programacao.html -->
<div class="modal fade" id="programar-modalAtividade" tabindex="-1"
     aria-labelledby="programar-modalAtividadeLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <form id="programar-form" method="post" class="needs-validation" novalidate>
        {% csrf_token %}

        <div class="modal-header">
          <h5 class="modal-title" id="programar-modalAtividadeLabel">
            <i class="bi bi-calendar2-event"></i> Programar atividades
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          <!-- Data selecionada (preenchida via JS) -->
          <input type="date" id="programar-dataAtividade" name="data" class="form-control" hidden required>

          <!-- ====== CARDS DE METAS ====== -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Escolha a meta</label>
            <input type="hidden" id="programar-meta" name="meta" required>
            <div id="programar-metasCards" class="row g-3"></div>
            <div class="invalid-feedback d-block" id="programar-metaFeedback" style="display:none;">
              Selecione uma meta.
            </div>
          </div>

          <hr class="my-3">

          <!-- ====== PAINÉIS LADO-A-LADO: EXPEDIENTE / DISPONÍVEIS ====== -->
          <div class="row g-3">
            <!-- Expediente -->
            <div class="col-12 col-lg-6">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white d-flex align-items-center justify-content-between py-2">
                  <span class="fw-semibold">Expediente administrativo</span>
                  <span class="badge rounded-pill bg-secondary" id="prog-expedienteCount">0</span>
                </div>
                <div class="card-body" id="prog-expedienteList">
                  <div class="text-muted">Carregando…</div>
                </div>
              </div>
            </div>

            <!-- Disponíveis -->
            <div class="col-12 col-lg-6">
              <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-white d-flex align-items-center justify-content-between py-2">
                  <span class="fw-semibold">Servidores disponíveis</span>
                  <span class="badge rounded-pill bg-secondary" id="prog-disponiveisCount">0</span>
                </div>
                <div class="card-body" id="prog-disponiveisList">
                  <div class="text-muted">Carregando…</div>
                </div>
              </div>
            </div>
          </div>

          <hr class="my-3">

          <!-- ====== IMPEDIDOS (ABAIXO) ====== -->
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-white d-flex align-items-center justify-content-between py-2">
              <span class="fw-semibold">Servidores impedidos</span>
              <span class="badge rounded-pill bg-secondary" id="prog-impedidosCount">0</span>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-sm mb-0">
                  <thead class="table-light">
                    <tr><th>Nome</th><th>Motivo</th></tr>
                  </thead>
                  <tbody id="prog-impedidosTbody">
                    <tr><td colspan="2" class="text-muted">Carregando…</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" id="programar-btnSalvar" class="btn btn-primary" disabled>Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>
