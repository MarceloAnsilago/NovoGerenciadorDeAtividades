{# controls bar #}
<div class="container">
  <div class="programar-controls my-3">
    <div class="row g-2 align-items-center">
      <div class="col-12 col-md d-flex align-items-center gap-2">
        <label for="programar-select-semana" class="mb-0 small text-muted">Semana:</label>
        <select id="programar-select-semana" class="form-select form-select-sm" style="min-width:220px" aria-label="Selecione a semana">
          <option value="">Selecione a semana</option>
          {# opções preenchidas pelo JS (datesSet → populateWeeksSelect) #}
        </select>
      </div>

      <div class="col-12 col-md-auto ms-md-auto text-md-end">
        <div class="btn-group">
          <button id="programar-btnImprimirProgramacao" class="btn btn-outline-primary btn-sm" disabled>
            Imprimir programação
          </button>
          <button id="programar-btnImprimirVista" class="btn btn-outline-secondary btn-sm" disabled>
            Imprimir vista
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
