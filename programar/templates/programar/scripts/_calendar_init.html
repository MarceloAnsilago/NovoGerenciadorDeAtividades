<script>
document.addEventListener('DOMContentLoaded', function(){
  const NS = window.PROGRAMAR = window.PROGRAMAR || {};
  const el = document.getElementById('programar-calendar');

  if (!window.FullCalendar) { console.error('[programar] FullCalendar não carregado.'); return; }
  if (!el) { console.error('[programar] #programar-calendar não encontrado.'); return; }

  // refs de UI do toolbar
  const selectSemana = document.getElementById('programar-select-semana');
  const btnPrintProg = document.getElementById('programar-btnImprimirProgramacao');
  const btnPrintView = document.getElementById('programar-btnImprimirVista');
  const relContainer = document.getElementById('programar-relatoriosContainer');

  function disablePrint(){
    [btnPrintProg, btnPrintView].forEach(b=>{
      if (b){ b.disabled = true; delete b.dataset.start; delete b.dataset.end; }
    });
  }
  function enablePrint(s,e){
    [btnPrintProg, btnPrintView].forEach(b=>{
      if (b){ b.disabled = false; b.dataset.start = s; b.dataset.end = e; }
    });
  }

  // util
  function isoDate(d){ return d.toISOString().slice(0,10); }
  function prevOrSameSaturday(d){ const x=new Date(d); const sh=(x.getDay()-6+7)%7; x.setDate(x.getDate()-sh); return x; }

  function populateWeeksSelectFromRange(viewStart, viewEndExclusive){
    if (!selectSemana) return;
    selectSemana.innerHTML = `<option value="">Selecione a semana</option>`;
    let sat = prevOrSameSaturday(new Date(viewStart));
    const endEx = new Date(viewEndExclusive);
    while (sat < endEx){
      const ini = new Date(sat);
      const fim = new Date(sat); fim.setDate(fim.getDate()+6);
      const opt = document.createElement('option');
      opt.value = isoDate(ini) + '_' + isoDate(fim);
      opt.dataset.inicio = isoDate(ini);
      opt.dataset.fim = isoDate(fim);
      opt.textContent = `${ini.toLocaleDateString('pt-BR')} → ${fim.toLocaleDateString('pt-BR')}`;
      selectSemana.appendChild(opt);
      sat.setDate(sat.getDate()+7);
    }
  }

  const calendar = new FullCalendar.Calendar(el, {
    locale: 'pt-br',
    timeZone: 'local',
    firstDay: 1,
    height: 'auto',
    headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
    events: (NS.urls && NS.urls.eventsFeed) || [],

    datesSet(arg){
      console.info('[programar] datesSet', arg.start, '→', arg.end);
      window._lastCalendarArg = arg;
      populateWeeksSelectFromRange(arg.start, arg.end);
      // reset UI
      disablePrint();
      if (relContainer && !relContainer.__filled){
        relContainer.innerHTML = `<div class="alert alert-light border mb-0">Selecione uma semana.</div>`;
      }
    },

    dateClick(info){
      console.info('[programar] dateClick', info.dateStr);
      if (typeof NS.openProgramarModal === 'function') {
        const dataBR = info.date.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
        NS.openProgramarModal(info.dateStr, dataBR);
      } else {
        console.error('[programar] NS.openProgramarModal não definida.');
        alert('Função de abrir modal não disponível.');
      }
    }
  });

  calendar.render();

  // fallback: popula semanas imediatamente
  try {
    const v = calendar.view;
    if (v && v.activeStart && v.activeEnd) {
      populateWeeksSelectFromRange(v.activeStart, v.activeEnd);
      disablePrint();
      if (relContainer && !relContainer.__filled){
        relContainer.innerHTML = `<div class="alert alert-light border mb-0">Selecione uma semana.</div>`;
      }
    }
  } catch (e) { console.warn('[programar] populate fallback falhou', e); }

  // change no select → carrega relatório + habilita impressão
  selectSemana?.addEventListener('change', function(){
    const opt = this.options[this.selectedIndex];
    const s = opt?.dataset?.inicio, e = opt?.dataset?.fim;
    if (s && e && typeof NS.loadRelatoriosForRange === 'function'){
      NS.loadRelatoriosForRange(s, e).finally(()=>{
        enablePrint(s,e);
        if (relContainer) relContainer.__filled = true;
      });
    } else {
      disablePrint();
      if (relContainer){
        relContainer.__filled = false;
        relContainer.innerHTML = `<div class="alert alert-light border mb-0">Selecione uma semana.</div>`;
      }
    }
  });

  // util de teste: chame no console _testOpen()
  window._testOpen = function(){
    const today = new Date().toISOString().slice(0,10);
    if (typeof NS.openProgramarModal === 'function'){
      NS.openProgramarModal(today, today.split('-').reverse().join('/'));
    } else {
      console.error('openProgramarModal ausente');
    }
  };
});
</script>
