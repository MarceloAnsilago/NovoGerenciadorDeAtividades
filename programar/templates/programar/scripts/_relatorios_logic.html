<script>
(function(){
  const NS = (window.PROGRAMAR = window.PROGRAMAR || {});
  NS.periodo = NS.periodo || 'semana';
  NS.reportMode = NS.reportMode || 'all';
  const DEBUG = false;

  const ALLOWED_TAGS = new Set([
    'DIV','SPAN','P','SMALL','STRONG','EM','B','I','BR','HR',
    'H1','H2','H3','H4','H5','H6',
    'UL','OL','LI',
    'TABLE','THEAD','TBODY','TR','TH','TD',
    'A'
  ]);

  function clearNode(node){
    node.replaceChildren();
  }

  function setLoading(container){
    clearNode(container);
    const wrap = document.createElement('div');
    wrap.className = 'text-center my-4';

    const spinner = document.createElement('div');
    spinner.className = 'spinner-border';
    spinner.setAttribute('role', 'status');
    spinner.setAttribute('aria-hidden', 'true');

    const msg = document.createElement('div');
    msg.className = 'small text-muted mt-2';
    msg.textContent = 'Carregando relatorio...';

    wrap.appendChild(spinner);
    wrap.appendChild(msg);
    container.appendChild(wrap);
  }

  function showError(container, msg){
    clearNode(container);
    const alert = document.createElement('div');
    alert.className = 'alert alert-danger mb-0';
    alert.textContent = msg || 'Erro ao carregar relatorios.';
    container.appendChild(alert);
  }

  function sanitizeNode(node){
    if (!node || node.nodeType !== Node.ELEMENT_NODE) return;

    const tag = node.tagName.toUpperCase();
    if (!ALLOWED_TAGS.has(tag)){
      const text = document.createTextNode(node.textContent || '');
      node.replaceWith(text);
      return;
    }

    const attrs = Array.from(node.attributes || []);
    for (const attr of attrs){
      const name = attr.name.toLowerCase();
      const value = attr.value || '';

      if (name.startsWith('on')){
        node.removeAttribute(attr.name);
        continue;
      }
      if (name === 'src' || name === 'srcdoc'){
        node.removeAttribute(attr.name);
        continue;
      }
      if (name === 'href'){
        const low = value.trim().toLowerCase();
        if (low.startsWith('javascript:') || low.startsWith('data:')){
          node.removeAttribute(attr.name);
        }
        continue;
      }
      if (
        name === 'class' || name === 'id' || name === 'title' || name === 'role' ||
        name === 'colspan' || name === 'rowspan' || name === 'scope' ||
        name === 'href' || name === 'target' || name === 'rel' ||
        name.startsWith('aria-') || name.startsWith('data-')
      ){
        continue;
      }
      node.removeAttribute(attr.name);
    }

    const children = Array.from(node.children || []);
    for (const child of children){
      sanitizeNode(child);
    }
  }

  function parseAndSanitizeHtml(rawHtml){
    const parser = new DOMParser();
    const doc = parser.parseFromString(String(rawHtml || ''), 'text/html');

    doc.querySelectorAll('script,style,iframe,object,embed,link,meta,base,form,input,button,textarea,select').forEach((el) => el.remove());

    const nodes = Array.from(doc.body.children || []);
    for (const node of nodes){
      sanitizeNode(node);
    }

    const fragment = document.createDocumentFragment();
    Array.from(doc.body.childNodes || []).forEach((n) => {
      fragment.appendChild(document.importNode(n, true));
    });
    return fragment;
  }

  function renderReportHtml(container, rawHtml){
    clearNode(container);
    const fragment = parseAndSanitizeHtml(rawHtml);
    if (!fragment.childNodes.length){
      showError(container, 'Resposta vazia do servidor.');
      return false;
    }
    container.appendChild(fragment);
    return true;
  }

  function injectRelatorioToolbar(){
    try{
      const area = document.querySelector('#relatorioPrintArea .card-body') || document.querySelector('#relatorioPrintArea');
      if (!area || area.querySelector('#relatorio-toolbar')) return;

      const wrap = document.createElement('div');
      wrap.id = 'relatorio-toolbar';
      wrap.className = 'd-flex justify-content-end mb-2 no-print';

      const group = document.createElement('div');
      group.className = 'btn-group btn-group-sm';

      const btn = document.createElement('button');
      btn.id = 'relatorio-btn-print';
      btn.type = 'button';
      btn.className = 'btn btn-outline-secondary';
      btn.textContent = 'Imprimir';

      group.appendChild(btn);
      wrap.appendChild(group);
      area.insertBefore(wrap, area.firstChild);
    }catch(_e){}
  }

  NS.loadRelatoriosForRange = async function(startISO, endISO){
    const container = document.getElementById('programar-relatoriosContainer');
    if (!container) return;
    if (!NS.urls || !NS.urls.relatorios){ showError(container, 'Endpoint de relatorios nao configurado.'); return; }

    setLoading(container);
    delete container.dataset.start; delete container.dataset.end;
    delete container.dataset.mode;

    let url = `${NS.urls.relatorios}?start=${encodeURIComponent(startISO)}&end=${encodeURIComponent(endISO)}`;
    try{
      const mode = String(NS.reportMode||'all').toLowerCase();
      if (mode === 'just-only') url += '&only_just=1';
      else if (mode === 'programacao-only') url += '&hide_just=1';
    }catch(_e){}
    if (DEBUG) console.info('[programar] fetch relatorios:', url);

    try{
      const resp = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
      if (!resp.ok){ showError(container, `Erro ao gerar relatorio (HTTP ${resp.status}).`); return; }
      const ctype = (resp.headers.get('content-type')||'').toLowerCase();
      if (ctype.includes('application/json')){
        const data = await resp.json().catch(()=>null);
        if (data && typeof data.html === 'string'){
          if (!renderReportHtml(container, data.html)) return;
          injectRelatorioToolbar();
        } else {
          showError(container, 'Resposta JSON invalida do servidor.');
          return;
        }
      } else {
        const rawHtml = await resp.text();
        if (!renderReportHtml(container, rawHtml)) return;
        injectRelatorioToolbar();
      }

      try{
        const mode = String(NS.reportMode || 'all').toLowerCase();
        ['programar-btnImprimirProgramacao','btnImprimirProgramacao','programar-btnImprimirJustificativas','btnImprimirJustificativas'].forEach(id=>{
          const b=document.getElementById(id); if (b){ b.dataset.start=startISO; b.dataset.end=endISO; b.disabled=false; }
        });
        container.dataset.start = startISO; container.dataset.end = endISO;
        container.dataset.mode = mode;
      }catch(e){ if (DEBUG) console.warn('dataset fail', e); }

    }catch(err){
      if (DEBUG) console.error('[programar] relatorios fetch error', err);
      showError(container, 'Erro ao carregar relatorios.');
    }
  };

  function isoDate(d){
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function monthRangeFromCalendar(){
    try{
      const arg = window._lastCalendarArg;
      const view = arg?.view;
      if (view?.currentStart && view?.currentEnd){
        const start = new Date(view.currentStart);
        const end = new Date(view.currentEnd);
        end.setDate(end.getDate() - 1);
        if (end < start){
          end.setTime(start.getTime());
        }
        return { start, end };
      }
    }catch(_e){}
    return null;
  }

  function fallbackMonthRange(){
    const today = new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), 1);
    const end = new Date(today.getFullYear(), today.getMonth()+1, 0);
    return { start, end };
  }

  document.addEventListener('click', function(ev){
    const btn = ev.target.closest?.('#programar-btnImprimirMes');
    if (!btn) return;
    ev.preventDefault();
    try{
      const range = monthRangeFromCalendar() || fallbackMonthRange();
      NS.reportMode = 'programacao-only';
      NS.loadRelatoriosForRange(isoDate(range.start), isoDate(range.end));
    }catch(_e){}
  });
})();
</script>
