<style id="programar-styles">
  /* ===== Escopo do app novo ===== */
  :root{
    --prog-card-bg:#fff;
    --prog-card-bd:#e9ecef;
    --prog-shadow:0 1px 3px rgba(0,0,0,.04);

    --prog-accent:#0d6efd;
    --prog-accent-100:#e7f1ff;
    --prog-accent-200:#cfe2ff;
  }

  /* ===== Calendário ===== */
  #programar-calendar{
    background:var(--prog-card-bg);
    border:1px solid var(--prog-card-bd);
    border-radius:.5rem;
    padding:8px;
    min-height:520px;
  }

  /* ===== Barra de controles ===== */
  .programar-controls{
    background:var(--prog-card-bg);
    border:1px solid var(--prog-card-bd);
    border-radius:.5rem;
    padding:.6rem .75rem;
    box-shadow:var(--prog-shadow);
  }
  .programar-controls .btn-group .btn{ min-width:160px; }
  @media (max-width:576px){
    .programar-controls .btn-group{ display:flex; gap:.5rem; width:100%; }
    .programar-controls .btn-group .btn{ width:100%; min-width:0; }
  }

  /* ===== Ribbon/marker ===== */
  #programar-ribbon{
    position:fixed; top:62px; right:-42px; transform:rotate(45deg);
    background:#198754; color:#fff; padding:6px 54px; font-weight:700;
    letter-spacing:.5px; z-index:2000; box-shadow:0 2px 8px rgba(0,0,0,.25);
    text-transform:uppercase; pointer-events:none;
  }
  #programar-marker{ position:fixed; left:12px; bottom:12px; z-index:2000; }
  #programar-marker .badge{
    background:#e9f7ef; color:#0f5132; border:1px solid #a3cfbb; font-weight:600;
  }

  /* ===== Caixinha impressão ===== */
  .print-cbx{
    display:inline-block; width:12px; height:12px;
    border:1.6px solid #222; border-radius:2px;
    margin:0 4px 0 6px; vertical-align:-2px; background:#fff;
  }
  @media print{ .print-cbx{ border-color:#000 } }

  /* ===== Tabela da programação ===== */
  .programacao-semana-table{ border-collapse:separate; border-spacing:0; }
  .programacao-semana-table th, .programacao-semana-table td{ vertical-align:top; }
  .programacao-semana-table thead th{
    border-top:1px solid var(--prog-card-bd);
    border-bottom:2px solid var(--prog-card-bd);
    border-right:1px solid var(--prog-card-bd);
  }
  .programacao-semana-table thead th:first-child{ border-left:1px solid var(--prog-card-bd); }
  .programacao-semana-table tbody td{ border-right:1px solid var(--prog-card-bd); }
  .programacao-semana-table tbody tr td:first-child{ border-left:1px solid var(--prog-card-bd); }
  .programacao-semana-table tbody tr:not(:last-child) td{ border-bottom:1px solid #f1f3f5; }

  .programacao-semana-table td.dia-cell{
    text-align:center; vertical-align:middle; white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }
  .programacao-semana-table .srv-line{
    display:flex; align-items:center; justify-content:space-between; gap:.5rem;
  }
  .programacao-semana-table .srv-choices{ white-space:nowrap; }
  .programacao-semana-table td.realizada-cell{ text-align:right; }
  .programacao-semana-table td.realizada-cell .choice{ white-space:nowrap; }
  .programacao-semana-table small{ color:#6c757d; font-size:.78rem; }

  @media print{ #programar-ribbon, #programar-marker, .programar-controls{ display:none !important; } }
  .programacao-semana-table td.atividade-cell{ text-align:center; }
  .programacao-semana-table .srv-inline{ display:inline; color:#212529; }

  /* ===== Cards de Metas (base) ===== */
  .prog-meta-card{
    position:relative;
    background:#fff;
    border:1px solid var(--prog-card-bd);
    border-radius:.75rem;
    padding:1rem .95rem .9rem .95rem;
    box-shadow:var(--prog-shadow);
    height:100%; cursor:pointer; outline:0;
    transition: box-shadow .15s ease, border-color .15s ease, transform .05s ease, background .15s ease;
  }
  .prog-meta-card::before{
    content:""; position:absolute; left:0; right:0; top:0; height:4px;
    border-radius:.75rem .75rem 0 0;
    background: linear-gradient(90deg,var(--prog-accent),#2dd4bf);
  }
  .prog-meta-card:hover{ border-color:#b6d4fe; box-shadow:0 8px 24px rgba(13,110,253,.16); }
  .prog-meta-card.selected{
    border-color:var(--prog-accent);
    box-shadow:0 0 0 2px rgba(13,110,253,.18);
    transform: translateY(-1px);
  }
  .prog-meta-head{ display:flex; align-items:center; gap:.6rem; margin-bottom:.35rem; }
  .prog-meta-icon{
    width:28px; height:28px; border-radius:8px;
    background:var(--prog-accent-100); color:var(--prog-accent);
    display:inline-flex; align-items:center; justify-content:center;
    font-size:15px; flex:0 0 28px; border:1px solid var(--prog-accent-200);
  }
  .prog-meta-title{ font-weight:800; letter-spacing:.3px; text-transform:uppercase; font-size:.95rem; margin:0; }
  .prog-meta-sep{ height:1px; background:#eef2f5; margin:.55rem 0 .55rem; }
  .prog-meta-line{ display:flex; align-items:center; gap:.4rem; color:var(--prog-accent); margin-bottom:.25rem; }
  .prog-meta-sub{ color:#6c757d; margin-bottom:.5rem; }
  .prog-meta-foot{
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px dashed #e9ecef; padding-top:.45rem; color:#6c757d;
  }

  /* ===== Barra de progresso (base com .bar) ===== */
  .prog-progress{
    position:relative; height:8px; width:100%;
    background:#f1f3f5; border-radius:999px; overflow:hidden;
  }
  .prog-progress .bar{
    height:100%; width:0;
    background:linear-gradient(90deg,#0d6efd,#66b2ff);
    transition:width .25s ease;
  }

  /* ===== Ícone do título do modal ===== */
  .modal .modal-title .bi{ color:var(--prog-accent); margin-right:.4rem; }

  /* ===== MODAL: cards de metas (fonte única) ===== */
  #programar-modalAtividade .prog-meta-card{
    border-radius:12px;
    overflow:hidden;                   /* respeita o raio */
    border:1px solid #dee2e6;
    background:#fff;
  }
  #programar-modalAtividade .prog-meta-card::before{
    content:"";
    position:absolute; left:0; right:0; top:0; height:4px;
    background:linear-gradient(90deg,#0d6efd,#2dd4bf);
    z-index:2;
  }
  #programar-modalAtividade .prog-meta-card:hover{
    border-color:#b6d4fe;
    box-shadow:0 8px 24px rgba(13,110,253,.16);
  }
  #programar-modalAtividade .prog-meta-card.selected{
    border-color:#0d6efd !important;
    box-shadow:0 0 0 3px rgba(13,110,253,.20) !important;
    background:#eaf3ff !important;     /* 🔵 azul clarinho */
    transform: translateY(-1px);
  }
  #programar-modalAtividade .prog-meta-card:focus-visible{
    outline:3px solid rgba(13,110,253,.35);
    outline-offset:2px;
  }

  /* MODAL: barra de progresso (trilho visível e arredondado) */
  #programar-modalAtividade .prog-progress{
    display:block; height:10px; margin-top:.5rem;
    background:#e9ecef; border:1px solid #d0d7de;
    border-radius:999px; overflow:hidden;
  }
  #programar-modalAtividade .prog-progress .bar{
    height:100%;
    background:linear-gradient(90deg,#0d6efd,#66b2ff);
  }

  /* ===== MODAL: borda clara SEMPRE nos cards não selecionados ===== */
#programar-modalAtividade .prog-meta-card{
  border-radius:12px;
  overflow:hidden;
  border:1.5px solid #d0d7de;              /* 🔹 cinza mais forte e 1.5px */
  background:#fff;
}

/* reforço explícito para o estado não-selecionado */
#programar-modalAtividade .prog-meta-card:not(.selected){
  border-color:#d0d7de !important;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}

/* selecionado continua azul e destacado */
#programar-modalAtividade .prog-meta-card.selected{
  border-color:#0d6efd !important;
  box-shadow:0 0 0 3px rgba(13,110,253,.20) !important;
  background:#eaf3ff !important;
  transform:translateY(-1px);
}

/* faixa no topo + barra de progresso (mantém como já estava) */
#programar-modalAtividade .prog-meta-card::before{
  content:""; position:absolute; left:0; right:0; top:0; height:4px;
  background:linear-gradient(90deg,#0d6efd,#2dd4bf);
  z-index:2;
}
#programar-modalAtividade .prog-progress{
  display:block; height:10px; margin-top:.5rem;
  background:#e9ecef; border:1px solid #d0d7de; border-radius:999px; overflow:hidden;
}
#programar-modalAtividade .prog-progress .bar{
  height:100%; background:linear-gradient(90deg,#0d6efd,#66b2ff); transition:width .25s ease;
}

</style>
